<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV Tabulator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">
  <div class="max-w-6xl mx-auto px-6 py-10">

    <header class="mb-8">
      <h1 class="text-3xl font-bold text-slate-900">CV Tabulator</h1>
      <p class="text-slate-500 mt-1">Drop in resumes and get a clean, structured table back in seconds.</p>
    </header>

    <!-- Drop zone -->
    <div
      id="drop-zone"
      class="relative flex flex-col items-center justify-center gap-3 rounded-2xl border-2 border-dashed border-slate-300 bg-white px-6 py-14 text-center transition-colors hover:border-indigo-400 hover:bg-indigo-50/40 cursor-pointer"
    >
      <input id="file-input" type="file" accept="application/pdf" multiple class="hidden" />

      <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
      </svg>

      <p class="text-slate-600">
        <span class="font-semibold text-indigo-600">Click to upload</span> or drag and drop
      </p>
      <p class="text-sm text-slate-400">PDF files only, multiple files supported</p>
    </div>

    <!-- Table section -->
    <div class="mt-10 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
        <h2 class="font-semibold text-slate-900">Candidates</h2>
        <button
          id="download-csv"
          class="inline-flex items-center gap-2 rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
          disabled
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 12m0 0 4.5-4.5M12 12V3" />
          </svg>
          Download CSV
        </button>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-sm text-left">
          <thead class="bg-slate-50 text-slate-500 uppercase text-xs tracking-wide">
            <tr>
              <th class="px-6 py-3 font-medium">Name</th>
              <th class="px-6 py-3 font-medium">Email</th>
              <th class="px-6 py-3 font-medium">Phone</th>
              <th class="px-6 py-3 font-medium">Experience (Years)</th>
              <th class="px-6 py-3 font-medium">Top Skills</th>
              <th class="px-6 py-3 font-medium">Education</th>
            </tr>
          </thead>
          <tbody id="table-body" class="divide-y divide-slate-100">
            <tr id="empty-row">
              <td colspan="6" class="px-6 py-10 text-center text-slate-400">
                No candidates yet — upload some CVs to get started.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
